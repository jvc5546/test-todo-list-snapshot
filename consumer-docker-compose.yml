services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/todoapp
      - PORT=3000
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
    labels:
      dev.okteto.com/from-snapshot-name: mongo-snapshot
      dev.okteto.com/from-snapshot-namespace: source-vol-snap
